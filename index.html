<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thailand Countdown Ultimate</title>

<!-- Font Awesome CDN สำหรับไอคอนอากาศ -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #0d47a1;
    --secondary: #42a5f5;
    --accent: #ff9800;
    --success: #4caf50; /* สีเขียววันที่ทำไปแล้ว */
}

body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #0d47a1, #42a5f5);
    background-attachment: fixed;
    color: white;
    padding: 15px;
    text-align: center;
}

.card {
    background: white;
    color: #333;
    padding: 20px;
    border-radius: 20px;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Progress Bar */
.progress-container {
    width: 100%;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    margin: 10px 0;
}
.bar {
    height: 15px;
    background: var(--success);
    width: 0%;
    transition: width .5s ease;
}

input, button {
    padding: 8px; margin: 5px; border-radius: 6px; border: 1px solid #ccc;
}
button { background: var(--primary); color: white; border: none; cursor: pointer; }

/* Grid Layout */
.grid-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 10px 0;
}
.box {
    background: #f0f4f8;
    color: var(--primary);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    min-width: 120px;
    border: 1px solid #d1d9e6;
}

/* Flight Info */
.flight-info {
    background: #e3f2fd;
    color: #0d47a1;
    padding: 15px;
    border-radius: 12px;
    font-weight: bold;
    margin: 15px 0;
    border-left: 5px solid var(--primary);
}

/* Weather Box */
.weather-box {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    background: #f0f4f8;
    color: var(--primary);
    padding: 8px 10px;
    border-radius: 12px;
    border: 1px solid #d1d9e6;
    font-size: 13px;
    min-width: 120px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.weather-box i { font-size: 18px; width: 25px; text-align: center; }

/* ไอคอนสีตามสภาพอากาศ */
.sunny { color: #ff9800; }
.cloudy { color: #90a4ae; }
.rainy { color: #2196f3; }
.thunder { color: #f44336; }
.snow { color: #00bcd4; }
.mist { color: #9e9e9e; }

/* Calendar */
#calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-top: 10px;
}
.calendar-day {
    padding: 8px 0;
    border-radius: 6px;
    font-size: 12px;
    background: #fff;
    border: 1px solid #eee;
}
.calendar-weekday { background: #bbdefb; font-weight: bold; padding: 5px 0; border-radius: 4px; }

/* Calendar Status */
.done { background: var(--success) !important; color: white; }
.travel { background: var(--accent) !important; color: white; font-weight: bold; }
.today { border: 2px solid var(--primary); }
</style>
</head>
<body>

<div class="card">
<h2>🇹🇭 นับถอยหลังกลับไทย ✈️</h2>

<p>ระบุวันบินกลับ:</p>
<input type="datetime-local" id="endDateInput">
<button onclick="saveSettings()">บันทึก</button>

<h3 id="countdownText">กำลังคำนวณ...</h3>
<div class="progress-container"><div class="bar" id="progressBar"></div></div>
<div id="percentText" style="font-weight:bold; color:var(--success);">0%</div>

<hr>
<h3>🛫 รายละเอียดการเดินทาง</h3>
<div class="flight-info" id="flightRoute"></div>

<hr>
<h3>🌍 เวลาโลก</h3>
<div class="grid-row" id="worldClock"></div>

<hr>
<h3>🌤 อากาศวันนี้</h3>
<div class="grid-row" id="weatherDisplay"></div>

<hr>
<h3>📆 ปฏิทินการทำงาน</h3>
<div id="monthLabel" style="font-weight:bold; color:var(--primary); margin-bottom:10px;"></div>
<button onclick="changeMonth(-1)">◀</button>
<button onclick="changeMonth(1)">▶</button>
<div id="calendar"></div>
</div>

<script>
/* ================= CONFIG ================= */
const WORK_START_DATE = new Date("2026-02-05T00:00:00");
const TRAVEL_DATE = new Date("2026-04-21T06:00:00");
const API_KEY = "10305e607cbb444690ceede20de29e6a";
let targetDate = new Date(localStorage.getItem("userEndDate") || "2026-04-23T23:50");

/* ================= INITIALIZE ================= */
function init() {
    document.getElementById("endDateInput").value = targetDate.toISOString().slice(0,16);
    updateTick();
    setInterval(updateTick, 1000);
    renderWeather();
    renderCalendar();
}
function saveSettings() {
    const val = document.getElementById("endDateInput").value;
    if(val){
        targetDate = new Date(val);
        localStorage.setItem("userEndDate", val);
        renderCalendar();
    }
}

/* ================= CORE LOGIC ================= */
function updateTick() {
    const now = new Date();
    const diff = targetDate - now;

    // Countdown
    if(diff<=0){
        document.getElementById("countdownText").innerHTML="🎉 ถึงวันเดินทางแล้ว!";
    }else{
        const d=Math.floor(diff/86400000);
        const h=Math.floor((diff%86400000)/3600000);
        const m=Math.floor((diff%3600000)/60000);
        const s=Math.floor((diff%60000)/1000);
        document.getElementById("countdownText").innerHTML=`เหลืออีก ${d} วัน ${h} ชม. ${m} นาที ${s} วิ`;
    }

    // Progress Bar
    const totalDuration = targetDate - WORK_START_DATE;
    const elapsed = now - WORK_START_DATE;
    const percent = Math.min(Math.max((elapsed/totalDuration)*100,0),100);
    document.getElementById("progressBar").style.width = percent + "%";
    document.getElementById("percentText").innerHTML = `ทำงานไปแล้ว ${percent.toFixed(2)}%`;

    // World Clock
    const timeOptions={hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false};
    document.getElementById("worldClock").innerHTML=`
        <div class="box">🇹🇭 ไทย: ${now.toLocaleTimeString("th-TH",{timeZone:"Asia/Bangkok",...timeOptions})}</div>
        <div class="box">🇲🇾 มาเลเซีย: ${now.toLocaleTimeString("th-TH",{timeZone:"Asia/Kuala_Lumpur",...timeOptions})}</div>
        <div class="box">🇪🇹 เอธิโอเปีย: ${now.toLocaleTimeString("th-TH",{timeZone:"Africa/Addis_Ababa",...timeOptions})}</div>
    `;

    // Flight Info
    const flightTimeStr = targetDate.toLocaleString("th-TH",{
        timeZone:"Africa/Addis_Ababa", day:'numeric', month:'long', hour:'2-digit', minute:'2-digit'
    });
    document.getElementById("flightRoute").innerHTML=`
        เส้นทาง: ADD ✈ SIN ✈ KUL ✈ BKK<br>
        <span style="font-size:13px;font-weight:normal;">เช็คอิน (เวลาเอธิโอเปีย): ${flightTimeStr} น.</span>
    `;
}

/* ================= WEATHER ================= */
async function renderWeather(){
    const cities=[{name:"Bangkok", code:"TH", flag:"🇹🇭"},{name:"Hawassa", code:"ET", flag:"🇪🇹"}];
    const weatherIcons={
        "Clear":"fa-sun sunny",
        "Clouds":"fa-cloud cloudy",
        "Rain":"fa-cloud-rain rainy",
        "Drizzle":"fa-cloud-showers-heavy rainy",
        "Thunderstorm":"fa-bolt thunder",
        "Snow":"fa-snowflake snow",
        "Mist":"fa-smog mist",
        "Fog":"fa-smog mist"
    };
    try{
        const html=await Promise.all(cities.map(async city=>{
            const response=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city.name},${city.code}&appid=${API_KEY}&units=metric`);
            const data=await response.json();
            const weatherMain=data.weather[0].main;
            const iconClass=weatherIcons[weatherMain]||"fa-cloud cloudy";
            return `
                <div class="weather-box">
                    <i class="fa-solid ${iconClass}"></i>
                    <div>
                        <b>${city.flag} ${city.name}</b><br>
                        ${Math.round(data.main.temp)}°C | ${weatherMain}
                    </div>
                </div>
            `;
        }));
        document.getElementById("weatherDisplay").innerHTML=html.join('');
    }catch(e){
        document.getElementById("weatherDisplay").innerHTML="โหลดข้อมูลอากาศไม่สำเร็จ";
    }
}

/* ================= CALENDAR ================= */
let viewDate=new Date();
function renderCalendar(){
    const cal=document.getElementById("calendar");
    cal.innerHTML="";
    const y=viewDate.getFullYear();
    const m=viewDate.getMonth();
    const monthNames=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
    document.getElementById("monthLabel").innerText=`${monthNames[m]} ${y+543}`;

    ["อา","จ","อ","พ","พฤ","ศ","ส"].forEach(d=>cal.innerHTML+=`<div class="calendar-weekday">${d}</div>`);

    const firstDay=new Date(y,m,1).getDay();
    const lastDate=new Date(y,m+1,0).getDate();
    const today=new Date(); today.setHours(0,0,0,0);

    for(let i=0;i<firstDay;i++) cal.innerHTML+=`<div></div>`;

    for(let d=1;d<=lastDate;d++){
        const currentLoopDate=new Date(y,m,d);
        let className="calendar-day";

        if(currentLoopDate>=WORK_START_DATE && currentLoopDate<today) className+=" done";
        if(currentLoopDate.toDateString()===TRAVEL_DATE.toDateString()) className+=" travel";
        if(currentLoopDate.toDateString()===today.toDateString()) className+=" today";

        cal.innerHTML+=`<div class="${className}">${d}</div>`;
    }
}
function changeMonth(step){
    viewDate.setMonth(viewDate.getMonth()+step);
    renderCalendar();
}

init();
</script>
</body>
</html>
